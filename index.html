<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026 하반기 여행 캘린더</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #f5f5f7;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, "Apple SD Gothic Neo", sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #1d1d1f;
  }
  @keyframes calShimmer { 0% { opacity: .6; } 50% { opacity: 1; } 100% { opacity: .6; } }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
(function () {
  var h = React.createElement;

  // ---- 카테고리 색상 ----
  var CAT = {
    '해외여행': '#4A90D9',
    '워케이션': '#5BB98C',
    '휴가': '#C2569C',
    '출장': '#6B7C93',
    '행사': '#E8A04B'
  };

  // ---- 데이터 로딩: index.html과 같은 폴더의 plan.json 한 파일만 읽습니다 ----
  function loadPlan() {
    return fetch('plan.json', { cache: 'no-store' })
      .then(function (r) { if (!r.ok) throw new Error('not found'); return r.json(); })
      .then(function (j) {
        var list = Array.isArray(j) ? j : (j.events || []);
        var events = [];
        for (var i = 0; i < list.length; i++) {
          var it = list[i] || {};
          var start = toDate(it.start);
          var end = toDate(it.end || it.start);
          if (!start || !end) continue;
          events.push({
            start: start,
            end: end,
            cat: String(it.category || it.cat || '').trim(),
            place: String(it.place || '').trim(),
            memo: String(it.memo || '').trim()
          });
        }
        return {
          events: events,
          title: (!Array.isArray(j) && j.title) ? j.title : null,
          subtitle: (!Array.isArray(j) && j.subtitle) ? j.subtitle : null
        };
      });
  }
  function toDate(str) {
    var m = /(\d{4})-(\d{1,2})-(\d{1,2})/.exec(str || '');
    return m ? new Date(+m[1], +m[2] - 1, +m[3]) : null;
  }
  function strip(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

  function App() {
    var st = React.useState({ data: null, error: null });
    var state = st[0], setState = st[1];

    React.useEffect(function () {
      loadPlan()
        .then(function (p) { setState({ data: p.events, error: null, title: p.title, subtitle: p.subtitle }); })
        .catch(function (e) { setState({ data: [], error: String(e) }); });
    }, []);

    var rng = monthRange();
    var s = rng[0], e = rng[rng.length - 1];
    var defSubtitle = s.year + '년 ' + (s.month + 1) + '월 – '
      + (s.year === e.year ? '' : e.year + '년 ') + (e.month + 1) + '월 · 여행과 리프레시';
    var title = state.title || '여행 캘린더';
    var subtitle = state.subtitle || defSubtitle;

    var gridCols = 'repeat(auto-fill,minmax(360px,1fr))';
    var weekend = true;

    var calendar = state.data ? buildCalendar(state.data, gridCols, weekend) : skeleton(gridCols);

    return h('div', { style: { minHeight: '100vh', background: '#f5f5f7', padding: '48px 0 64px' } },
      h('div', { style: { maxWidth: '1280px', margin: '0 auto', padding: '0 40px' } },
        // 헤더 + 범례
        h('div', { style: { display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: '24px', flexWrap: 'wrap', marginBottom: '32px' } },
          h('div', null,
            h('div', { style: { fontSize: '40px', fontWeight: 600, letterSpacing: '-0.5px', lineHeight: '1.1', color: '#1d1d1f' } }, title),
            h('div', { style: { fontSize: '17px', letterSpacing: '-0.374px', color: 'rgba(0,0,0,0.5)', marginTop: '8px' } }, subtitle)
          ),
          h('div', { style: { display: 'flex', gap: '18px', alignItems: 'center', flexWrap: 'wrap' } },
            legend('#4A90D9', '해외여행'),
            legend('#5BB98C', '워케이션'),
            legend('#C2569C', '휴가'),
            legend('#6B7C93', '출장'),
            legend('#E8A04B', '행사·기념일')
          )
        ),
        // 달력
        calendar,
        // 에러/안내
        state.error
          ? h('div', { style: { marginTop: '20px', fontSize: '13px', color: '#e0584f' } },
              'plan.json 파일을 불러오지 못했습니다. index.html과 같은 폴더에 plan.json이 있는지 확인하세요.')
          : null,
        h('div', { style: { marginTop: '28px', fontSize: '12px', letterSpacing: '-0.12px', color: 'rgba(0,0,0,0.32)' } },
          '일정은 plan.json 파일에서 불러옵니다 · 파일을 고치면 달력이 바뀝니다.')
      )
    );
  }

  function legend(color, label) {
    return h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } },
      h('span', { style: { width: '11px', height: '11px', borderRadius: '3px', background: color, display: 'inline-block' } }),
      h('span', { style: { fontSize: '13px', letterSpacing: '-0.2px', color: 'rgba(0,0,0,0.7)' } }, label)
    );
  }

  // 이번 달부터 6개월(연도 경계 자동 처리)
  function monthRange() {
    var now = new Date();
    var baseY = now.getFullYear(), baseM = now.getMonth();
    var list = [];
    for (var k = 0; k < 6; k++) {
      var mm = baseM + k;
      list.push({ year: baseY + Math.floor(mm / 12), month: ((mm % 12) + 12) % 12 });
    }
    return list;
  }

  function buildCalendar(events, gridCols, weekend) {
    var cards = monthRange().map(function (ym) { return monthCard(ym.year, ym.month, events, weekend); });
    return h('div', { style: { display: 'grid', gridTemplateColumns: gridCols, gap: '20px' } }, cards);
  }

  function monthCard(year, month, events, weekend) {
    var MN = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    var EN = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    var WD = ['일','월','화','수','목','금','토'];
    var wdColor = function (i) { return weekend && i === 0 ? '#e0584f' : weekend && i === 6 ? '#4A90D9' : 'rgba(0,0,0,0.4)'; };

    var first = new Date(year, month, 1);
    var startWeekday = first.getDay();
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    var weeksCount = Math.ceil((startWeekday + daysInMonth) / 7);

    var weeks = [];
    for (var w = 0; w < weeksCount; w++) {
      var cells = [];
      for (var i = 0; i < 7; i++) {
        var dn = w * 7 + i - startWeekday + 1;
        cells.push((dn >= 1 && dn <= daysInMonth) ? dn : null);
      }
      var segs = [];
      for (var ei = 0; ei < events.length; ei++) {
        var ev = events[ei];
        var cs = null, ce = null;
        for (var col = 0; col < 7; col++) {
          var dnn = w * 7 + col - startWeekday + 1;
          if (dnn < 1 || dnn > daysInMonth) continue;
          var cur = new Date(year, month, dnn);
          if (cur >= strip(ev.start) && cur <= strip(ev.end)) {
            if (cs === null) cs = col;
            ce = col;
          }
        }
        if (cs !== null) {
          var startDn = w * 7 + cs - startWeekday + 1;
          var isStart = new Date(year, month, startDn).getTime() === strip(ev.start).getTime();
          segs.push({ ev: ev, cs: cs, ce: ce, isStart: isStart });
        }
      }
      segs.sort(function (a, b) { return a.cs - b.cs || (b.ce - b.cs) - (a.ce - a.cs); });
      var lanes = [];
      for (var si = 0; si < segs.length; si++) {
        var s = segs[si];
        var placed = false;
        for (var l = 0; l < lanes.length; l++) {
          if (lanes[l] < s.cs) { s.lane = l; lanes[l] = s.ce; placed = true; break; }
        }
        if (!placed) { s.lane = lanes.length; lanes.push(s.ce); }
      }
      weeks.push({ cells: cells, segs: segs, laneCount: lanes.length });
    }
    var maxLanes = Math.max.apply(null, [1].concat(weeks.map(function (x) { return x.laneCount; })));

    var header = h('div', { key: 'hd', style: { display: 'flex', alignItems: 'baseline', gap: '8px', marginBottom: '12px' } },
      h('span', { style: { fontSize: '19px', fontWeight: 600, color: '#1d1d1f', letterSpacing: '-0.3px' } }, MN[month]),
      h('span', { style: { fontSize: '11px', fontWeight: 600, color: 'rgba(0,0,0,0.3)', letterSpacing: '0.5px' } }, EN[month])
    );

    var wdRow = h('div', { key: 'wdrow', style: { display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', marginBottom: '6px' } },
      WD.map(function (d, i) { return h('div', { key: 'wd' + i, style: { textAlign: 'center', fontSize: '11px', fontWeight: 600, color: wdColor(i) } }, d); })
    );

    var weekEls = weeks.map(function (wk, wi) {
      var numCells = wk.cells.map(function (d, col) {
        var color = '#1d1d1f';
        if (d === null) color = 'transparent';
        else if (weekend && col === 0) color = '#e0584f';
        else if (weekend && col === 6) color = '#4A90D9';
        return h('div', { key: 'n' + col, style: { gridColumn: (col + 1) + '/' + (col + 2), gridRow: '1', textAlign: 'center', fontSize: '12px', color: color, lineHeight: '20px' } }, d ? String(d) : '');
      });
      var barEls = wk.segs.map(function (s, si) {
        var color = CAT[s.ev.cat] || '#9CA3AF';
        var isEvent = s.ev.cat === '행사';
        var label = isEvent ? s.ev.place : (s.ev.memo ? s.ev.place + ' · ' + s.ev.memo : s.ev.place);
        var titleTxt = s.ev.place + (s.ev.memo ? ' · ' + s.ev.memo : '');
        return h('div', { key: 'b' + si, title: titleTxt, style: { gridColumn: (s.cs + 1) + '/' + (s.ce + 2), gridRow: String(s.lane + 2), background: color, color: '#fff', fontSize: '11px', fontWeight: 600, borderRadius: '5px', padding: '0 6px', margin: '0 2px', height: '17px', lineHeight: '17px', overflow: 'hidden', whiteSpace: 'nowrap', textOverflow: 'ellipsis' } }, s.isStart ? label : '');
      });
      return h('div', { key: 'w' + wi, style: { display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gridTemplateRows: '20px repeat(' + maxLanes + ',19px)', rowGap: '2px', marginBottom: '3px' } }, numCells.concat(barEls));
    });

    return h('div', { key: 'm' + year + '-' + month, style: { background: '#fff', borderRadius: '16px', padding: '16px 16px 12px', boxShadow: 'rgba(0,0,0,0.04) 0px 4px 16px' } },
      [header, wdRow].concat(weekEls));
  }

  function skeleton(gridCols) {
    var cards = [];
    for (var i = 0; i < 6; i++) {
      cards.push(h('div', { key: i, style: { background: '#fff', borderRadius: '16px', padding: '16px', boxShadow: 'rgba(0,0,0,0.04) 0px 4px 16px', animation: 'calShimmer 1.4s ease-in-out infinite' } },
        h('div', { style: { width: '48px', height: '18px', borderRadius: '6px', background: '#ececef', marginBottom: '16px' } }),
        h('div', { style: { height: '190px', borderRadius: '8px', background: '#f3f3f5' } })
      ));
    }
    return h('div', { style: { display: 'grid', gridTemplateColumns: gridCols, gap: '20px' } }, cards);
  }

  ReactDOM.createRoot(document.getElementById('root')).render(h(App));
})();
</script>
</body>
</html>
